<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Luderis — Aprendé lo que querés</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --ink: #0D1F3C;
    --ink-2: #2C4A6E;
    --muted: #5A7294;
    --paper: #F6F9FF;
    --paper-2: #EEF3FC;
    --line: #DDE5F5;
    --blue: #1A6ED8;
    --blue-deep: #0F3F7A;
    --blue-ink: #091E42;
    --orange: #2EC4A0;
    --orange-deep: #1E8E73;
    --lime: #2EC4A0;
    --violet: #7B5CF0;
    --amber: #E8891C;
    --amber-light: #F4C030;
    --pink: #D85AA3;
    --font-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--font-display);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;max-width:100vw}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}
  ::selection{background:var(--ink);color:var(--paper)}
  @media (pointer:fine){
    html,body{cursor:none}
    button,a,[data-mag]{cursor:none}
  }
</style>
</head>
<body>
  <div id="root"></div>
  <!-- React producción — sin warnings, más rápido -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Bundle pre-compilado — sin Babel runtime -->
  <script src="bundle.js"></script>
</body>
</html>

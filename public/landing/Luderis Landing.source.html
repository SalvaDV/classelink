  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

<style>
  :root{
    /* Luderis palette */
    --ink: #0D1F3C;
    --ink-2: #2C4A6E;
    --muted: #5A7294;
    --paper: #F6F9FF;
    --paper-2: #EEF3FC;
    --line: #DDE5F5;
    /* Brand azul Luderis */
    --blue: #1A6ED8;
    --blue-deep: #0F3F7A;
    --blue-ink: #091E42;
    /* Teal Luderis (reemplaza naranja) */
    --orange: #2EC4A0;
    --orange-deep: #1E8E73;
    /* Accentos extra */
    --lime: #2EC4A0;
    --violet: #7B5CF0;
    --font-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--font-display);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}
  ::selection{background:var(--ink);color:var(--paper)}
  @media (pointer:fine){
    html,body{cursor:none}
    button,a,[data-mag]{cursor:none}
  }
</style>
</head>
